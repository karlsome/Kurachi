<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>呼び出しモニター / Call Monitor</title>
    <style>
        :root {
            --bg: #0A0F1A;
            --bg-2: #111A2B;
            --tile: #16223A;
            --tile-border: #243450;
            --text: #E7EEF9;
            --muted: #8499B8;
            --red: #E11D2A;
            --red-2: #FF3B47;
            --green: #29C36A;
            --amber: #F5A524;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", system-ui, -apple-system, sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2vh 2.2vw;
            gap: 1.6vh;
        }

        /* ---------- Header ---------- */
        header {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 24px;
        }

        .head-right {
            display: flex;
            align-items: center;
            gap: 26px;
        }

        .clock {
            font-size: clamp(24px, 2.8vw, 52px);
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
        }

        .conn {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: clamp(12px, 1.1vw, 20px);
            font-weight: 700;
            color: var(--muted);
        }

        .conn .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--muted);
        }

        .conn.online .dot {
            background: var(--green);
            box-shadow: 0 0 12px var(--green);
        }

        .conn.offline .dot {
            background: var(--amber);
            box-shadow: 0 0 12px var(--amber);
        }

        /* ---------- Grid ---------- */
        .grid {
            flex: 1;
            display: grid;
            gap: 1.4vh 1.2vw;
            grid-auto-rows: 1fr;
            min-height: 0;
        }

        .tile {
            position: relative;
            background: var(--tile);
            border: 3px solid var(--tile-border);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.6vh;
            overflow: hidden;
            transition: background 0.2s, border-color 0.2s;
        }

        .tile .name {
            font-size: clamp(22px, 2.6vw, 56px);
            font-weight: 900;
            letter-spacing: 0.02em;
        }

        .tile .state {
            font-size: clamp(12px, 1.1vw, 22px);
            font-weight: 800;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* calling */
        .tile.calling {
            background: var(--red);
            border-color: #fff;
            animation: tileBlink 0.9s steps(1) infinite;
        }

        .tile.calling .name {
            color: #fff;
            white-space: nowrap;
            max-width: 100%;
            padding: 0 8px;
            /* font-size is set by JS (fitCallingName) to be as large as fits */
        }

        /* On a calling tile the name alone fills the card (no "CALLING" subtitle),
           alternating with the big rank — so the machine reads big from far away. */
        .tile.calling .state {
            display: none;
        }

        @keyframes tileBlink {

            0%,
            100% {
                background: var(--red);
                box-shadow: 0 0 0 0 rgba(255, 59, 71, 0.0), 0 0 40px rgba(225, 29, 42, 0.6);
            }

            50% {
                background: #7d0f17;
                box-shadow: 0 0 0 0 rgba(255, 59, 71, 0.0), 0 0 10px rgba(225, 29, 42, 0.2);
            }
        }

        /* Big full-tile rank shown while flipping (see .grid.flip below) */
        .big-rank {
            display: none;
            font-size: clamp(56px, 8vw, 200px);
            font-weight: 900;
            color: #fff;
            line-height: 0.9;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
        }

        /* Each calling tile alternates: machine name <-> big rank number, in
           sync across all tiles, driven by toggling .flip on the grid. */
        .grid.flip .tile.calling .name,
        .grid.flip .tile.calling .state {
            display: none;
        }

        .grid.flip .tile.calling .big-rank {
            display: block;
        }

        .wait {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: clamp(12px, 1.2vw, 24px);
            font-weight: 800;
            color: #FFE3E5;
            font-variant-numeric: tabular-nums;
            display: none;
        }

        .tile.calling .wait {
            display: block;
        }

        /* ---------- Full-screen takeover ---------- */
        .takeover {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2vh;
            background: radial-gradient(circle at 50% 40%, #C2151F, #5A0A0E 80%);
            animation: takeoverBlink 0.7s steps(1) infinite;
        }

        .takeover.show {
            display: flex;
        }

        @keyframes takeoverBlink {

            0%,
            100% {
                background: radial-gradient(circle at 50% 40%, #E11D2A, #5A0A0E 80%);
            }

            50% {
                background: radial-gradient(circle at 50% 40%, #8d1118, #380a0c 80%);
            }
        }

        .takeover .to-label {
            font-size: clamp(28px, 4vw, 80px);
            font-weight: 900;
            color: #FFD7DA;
            letter-spacing: 0.1em;
        }

        .takeover .to-machine {
            font-size: clamp(80px, 18vw, 360px);
            font-weight: 900;
            color: #fff;
            line-height: 0.95;
            text-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
        }

        .takeover .to-rank {
            font-size: clamp(20px, 2.4vw, 48px);
            font-weight: 900;
            color: #fff;
            background: rgba(0, 0, 0, 0.25);
            border: 3px solid #fff;
            border-radius: 999px;
            padding: 0.2em 1em;
        }

        .sound-enable {
            position: fixed;
            bottom: 16px;
            left: 16px;
            z-index: 60;
            background: var(--bg-2);
            color: var(--muted);
            border: 2px solid var(--tile-border);
            border-radius: 999px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .sound-enable.on {
            color: var(--green);
            border-color: var(--green);
        }

        /* One-time audio-unlock start gate */
        .audio-gate {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2.4vh;
            background: rgba(10, 15, 26, 0.97);
            cursor: pointer;
            text-align: center;
            padding: 24px;
        }

        .audio-gate.hidden {
            display: none;
        }

        .audio-gate .ag-icon {
            font-size: clamp(60px, 9vw, 160px);
        }

        .audio-gate .ag-title {
            font-size: clamp(30px, 4.5vw, 96px);
            font-weight: 900;
            color: var(--text);
        }

        .audio-gate .ag-sub {
            font-size: clamp(16px, 1.8vw, 34px);
            font-weight: 700;
            color: var(--muted);
        }
    </style>
</head>

<body>
    <div class="app">
        <header>
            <div class="head-right">
                <div class="clock" id="clock">--:--</div>
                <div class="conn" id="conn">
                    <span class="dot"></span><span id="connText">接続中… / Connecting…</span>
                </div>
            </div>
        </header>

        <div class="grid" id="grid"></div>
    </div>

    <!-- Full-screen new-call takeover -->
    <div class="takeover" id="takeover">
        <div class="to-label">呼び出し / CALLING LEADER</div>
        <div class="to-machine" id="toMachine">—</div>
        <div class="to-rank" id="toRank">#1</div>
    </div>

    <button type="button" class="sound-enable" id="soundEnable">🔇 音を有効化 / Enable sound</button>

    <!-- One-time start gate: a single tap per page load unlocks audio output
         (browsers keep sound muted until a real user gesture). -->
    <div class="audio-gate" id="audioGate">
        <div class="ag-icon">🔊</div>
        <div class="ag-title">タップして開始</div>
        <div class="ag-sub">Tap anywhere to start the monitor &amp; enable sound</div>
    </div>

    <script>
        //const serverURL = "https://kurachi.onrender.com";
        //const serverURL = "http://localhost:3000";
        const serverURL = "http://192.168.3.9:3000";

        const params = new URLSearchParams(location.search);
        const FACTORY = params.get('filter') || params.get('factory') || '';
        const SERVER = params.get('server') || serverURL; // ?server= override for local testing

        // Per-factory machine roster (mirrors chooseMachine.html). Office/entrance ignored.
        const FACTORY_MACHINES = {
            '小瀬': [
                'OZNC01', 'OZNC02', 'OZNC03', 'OZNC04', 'OZNC05', 'OZNC06',
                'OZNC07', 'OZNC08', 'OZNC09', 'OZNC10', 'OZNC11', 'OZNC12',
                'OZNC13', 'OZNC14', 'OZNC15', 'OZNC16', 'OZNC17', 'OZNC18',
                'OZMANAS'
            ]
        };

        document.title = (FACTORY || '工場') + ' 呼び出しモニター / Call Monitor';

        // ----- Build the grid -----
        const grid = document.getElementById('grid');
        const tileByMachine = new Map();
        let roster = (FACTORY_MACHINES[FACTORY] || []).slice();

        function chooseColumns(n) {
            if (n <= 4) return n || 1;
            if (n <= 6) return 3;
            if (n <= 12) return 4;
            if (n <= 20) return 5;
            return 6;
        }

        function renderRoster() {
            grid.innerHTML = '';
            tileByMachine.clear();
            const cols = chooseColumns(roster.length);
            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            roster.forEach(m => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.dataset.machine = m;
                tile.innerHTML =
                    '<div class="name">' + m + '</div>' +
                    '<div class="big-rank"></div>' +
                    '<div class="state">稼働 / RUNNING</div>' +
                    '<div class="wait"></div>';
                grid.appendChild(tile);
                tileByMachine.set(m, tile);
            });
        }
        renderRoster();

        // ----- Clock -----
        function tickClock() {
            const d = new Date();
            const p = n => String(n).padStart(2, '0');
            document.getElementById('clock').textContent = p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
        }
        tickClock();
        setInterval(tickClock, 1000);

        // ----- Sound: ON by default. Browser autoplay rules keep the audio
        // context "suspended" until a user gesture, so we create it up front,
        // try to resume immediately, and also unlock on the first interaction
        // (kiosk/TV browsers launched with autoplay allowed start instantly).
        let audioCtx = null;
        let soundOn = true;
        function ensureAudio() {
            if (!soundOn) return false;
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                return audioCtx.state === 'running';
            } catch (e) { return false; }
        }
        function updateSoundButton() {
            const btn = document.getElementById('soundEnable');
            if (!btn) return;
            if (soundOn) {
                btn.classList.add('on');
                btn.textContent = '🔊 音 ON / Sound on';
            } else {
                btn.classList.remove('on');
                btn.textContent = '🔇 音 OFF / Muted';
            }
        }
        updateSoundButton();

        // One-time start gate: a single user gesture is required by the browser
        // before any audio actually plays (even when the context reports
        // "running"). The first tap/click/key anywhere resumes audio, plays a
        // confirmation chime, and hides the gate for the rest of the session.
        let audioUnlocked = false;
        function unlockAudioAndStart() {
            if (audioUnlocked) return;
            audioUnlocked = true;
            ensureAudio();
            const gate = document.getElementById('audioGate');
            if (gate) gate.classList.add('hidden');
            updateSoundButton();
            playAlert(); // confirmation chime so the operator hears it works
            ['pointerdown', 'touchstart', 'keydown', 'click'].forEach(e2 => window.removeEventListener(e2, unlockAudioAndStart));
        }
        ['pointerdown', 'touchstart', 'keydown', 'click'].forEach(ev => {
            window.addEventListener(ev, unlockAudioAndStart, { passive: true });
        });

        // Button toggles mute on/off (after the gate is dismissed)
        document.getElementById('soundEnable').addEventListener('click', function (e) {
            e.stopPropagation();
            soundOn = !soundOn;
            if (soundOn) { ensureAudio(); playAlert(); }
            updateSoundButton();
        });

        // Ascending 3-chime "attention" call (PA / airport pre-announcement
        // style): three rising bell-like notes that grab attention without being
        // harsh, and carry across the floor.
        function playAlert() {
            if (!ensureAudio()) return;
            const ctx = audioCtx;
            const t0 = ctx.currentTime + 0.02;
            const notes = [587.33, 783.99, 1046.50]; // D5 → G5 → C6 (rising)
            const step = 0.34;   // time between chime onsets
            const dur = 0.9;     // each chime rings out (bell-like decay)
            notes.forEach((freq, i) => {
                const t = t0 + i * step;
                const g = ctx.createGain();
                g.connect(ctx.destination);
                g.gain.setValueAtTime(0.0001, t);
                g.gain.exponentialRampToValueAtTime(0.32, t + 0.015); // soft attack
                g.gain.exponentialRampToValueAtTime(0.0001, t + dur); // bell decay
                // Fundamental + soft octave overtone for a chime/bell timbre
                [[freq, 1], [freq * 2, 0.25]].forEach(([f, amp]) => {
                    const o = ctx.createOscillator();
                    const og = ctx.createGain();
                    o.type = 'sine';
                    o.frequency.setValueAtTime(f, t);
                    og.gain.value = amp;
                    o.connect(og); og.connect(g);
                    o.start(t); o.stop(t + dur + 0.05);
                });
            });
        }

        // Keep nagging until the call is cleared: repeat the alert every 10s
        // while any machine is still calling.
        let alertTimer = null;
        function startAlertLoop() {
            if (alertTimer) return;
            alertTimer = setInterval(() => {
                if (activeList.length > 0) playAlert();
                else stopAlertLoop();
            }, 10000);
        }
        function stopAlertLoop() {
            if (alertTimer) { clearInterval(alertTimer); alertTimer = null; }
        }

        // ----- State + rendering of active calls -----
        let activeList = [];                  // [{machine, since}] sorted earliest-first
        let activeSince = new Map();          // machine -> since (for wait timers + new detection)

        function fmtWait(ms) {
            const s = Math.max(0, Math.floor(ms / 1000));
            const m = Math.floor(s / 60), ss = s % 60;
            const p = n => String(n).padStart(2, '0');
            return p(m) + ':' + p(ss);
        }

        function refreshWaitTimers() {
            const now = Date.now();
            activeSince.forEach((since, machine) => {
                const tile = tileByMachine.get(machine);
                if (tile) {
                    const w = tile.querySelector('.wait');
                    if (w) w.textContent = fmtWait(now - since);
                }
            });
        }
        setInterval(refreshWaitTimers, 1000);

        // Alternate every calling tile between its machine name and a big rank
        // number once per second, so the order is readable from far away.
        setInterval(() => {
            if (activeList.length > 0) {
                grid.classList.toggle('flip');
            } else if (grid.classList.contains('flip')) {
                grid.classList.remove('flip');
            }
        }, 1000);

        // Size a calling tile's machine name as large as fits on one line
        // (shorter names render bigger). Empirical width factor for the bold font.
        function fitCallingName(tile, machine) {
            const nameEl = tile.querySelector('.name');
            if (!nameEl) return;
            const w = tile.clientWidth || 300;
            const chars = Math.max(1, String(machine).length);
            const size = Math.max(28, Math.min(110, Math.floor((w - 28) / (chars * 0.82))));
            nameEl.style.fontSize = size + 'px';
        }
        // Recompute on resize so the wall display stays correct at any size.
        window.addEventListener('resize', () => {
            tileByMachine.forEach((tile, machine) => {
                if (tile.classList.contains('calling')) fitCallingName(tile, machine);
            });
        });

        function applyActive(list) {
            // Ensure roster contains any unexpected machine ids from events
            let rosterChanged = false;
            list.forEach(item => {
                if (!tileByMachine.has(item.machine)) {
                    roster.push(item.machine);
                    rosterChanged = true;
                }
            });
            if (rosterChanged) {
                renderRoster();
            }

            const prev = new Set(activeSince.keys());
            activeList = list.slice().sort((a, b) => a.since - b.since);
            const newSince = new Map();
            activeList.forEach(it => newSince.set(it.machine, it.since));

            // Detect newly-added machines (for the takeover announcement)
            const newlyAdded = activeList.filter(it => !prev.has(it.machine));

            // Paint tiles
            tileByMachine.forEach((tile, machine) => {
                const idx = activeList.findIndex(it => it.machine === machine);
                if (idx >= 0) {
                    tile.classList.add('calling');
                    tile.querySelector('.big-rank').textContent = '#' + (idx + 1);
                    fitCallingName(tile, machine);
                } else {
                    tile.classList.remove('calling');
                    tile.querySelector('.name').style.fontSize = ''; // back to running size
                    tile.querySelector('.state').textContent = '稼働 / RUNNING';
                    const w = tile.querySelector('.wait'); if (w) w.textContent = '';
                }
            });

            activeSince = newSince;
            updateBanner();
            refreshWaitTimers();

            // Announce each newly-added machine (queued, 3s each) + sound alert
            if (newlyAdded.length) {
                playAlert();
                newlyAdded
                    .sort((a, b) => a.since - b.since)
                    .forEach(it => queueTakeover(it.machine));
            }

            // Keep the audible alert nagging while any call is unresolved
            if (activeList.length > 0) startAlertLoop();
            else stopAlertLoop();
        }

        function updateBanner() {
            const banner = document.getElementById('banner');
            if (!banner) return; // banner removed from layout
            const text = document.getElementById('bannerText');
            const n = activeList.length;
            if (n > 0) {
                banner.classList.add('alert');
                const names = activeList.map((it, i) => '#' + (i + 1) + ' ' + it.machine).join('　');
                text.innerHTML = '<span class="pill">' + n + '</span> 台 呼び出し中 / Calling — ' + names;
            } else {
                banner.classList.remove('alert');
                text.textContent = 'すべて正常 / All clear';
            }
        }

        // ----- Takeover queue -----
        const takeoverQueue = [];
        let takeoverRunning = false;
        function queueTakeover(machine) {
            takeoverQueue.push(machine);
            if (!takeoverRunning) runTakeover();
        }
        function runTakeover() {
            if (!takeoverQueue.length) { takeoverRunning = false; return; }
            takeoverRunning = true;
            const machine = takeoverQueue.shift();
            // Only announce if still active
            const idx = activeList.findIndex(it => it.machine === machine);
            if (idx < 0) { runTakeover(); return; }
            const el = document.getElementById('takeover');
            document.getElementById('toMachine').textContent = machine;
            document.getElementById('toRank').textContent = '#' + (idx + 1) + ' に呼ばれました / called';
            el.classList.add('show');
            setTimeout(() => {
                el.classList.remove('show');
                setTimeout(runTakeover, 350); // brief gap before next
            }, 3000);
        }

        // Expose for offline/unit testing without a live SSE server
        window.__applyStopCallPayload = function (payload) {
            if (payload && payload.type === 'stopcall' && Array.isArray(payload.active)) {
                applyActive(payload.active);
            }
        };

        // ----- SSE connection -----
        function setConn(state, label) {
            const c = document.getElementById('conn');
            c.classList.remove('online', 'offline');
            if (state) c.classList.add(state);
            document.getElementById('connText').textContent = label;
        }

        let es = null;
        function connect() {
            if (!FACTORY) { setConn('offline', '工場が指定されていません / No factory'); return; }
            try {
                es = new EventSource(`${SERVER}/sse/factory/${encodeURIComponent(FACTORY)}`);
            } catch (e) {
                setConn('offline', '接続エラー / Connection error');
                return;
            }
            es.onopen = () => setConn('online', '接続済み / Connected');
            es.onmessage = (ev) => {
                let data;
                try { data = JSON.parse(ev.data); } catch (e) { return; }
                if (data.type === 'connected') {
                    setConn('online', '接続済み / Connected');
                } else if (data.type === 'stopcall') {
                    applyActive(Array.isArray(data.active) ? data.active : []);
                }
            };
            es.onerror = () => {
                setConn('offline', '再接続中… / Reconnecting…');
                // EventSource auto-reconnects; nothing else needed.
            };
        }
        connect();
    </script>
</body>

</html>
